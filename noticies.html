<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Totes les notícies i novetats de l'IES Calvià.">
  <title>Notícies — IES Calvià</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.3.2/css/flag-icons.min.css">
</head>
<body>

  <!-- BANER SUPERIOR -->

  <div data-include="partials/header.html"></div>

  <!-- CAPÇALERA -->
  <header class="pagina-hero">
    <div class="contenidor">
      <p class="engruna"><a href="index.html">Inici</a> › Notícies</p>
      <h1>Notícies i actualitat</h1>
      <p>Tota l'activitat i les novetats de l'IES Calvià</p>
    </div>
  </header>

  <!-- FILTRE PER CATEGORIA -->
  <section class="seccio seccio-fons">
    <div class="contenidor">
      <div style="margin-bottom:2rem">
        <div class="nivell-tabs" id="filtres-noticies">
          <button class="tab-btn actiu" data-categoria="totes">Totes</button>
          <button class="tab-btn" data-categoria="ESO">ESO</button>
          <button class="tab-btn" data-categoria="Batxillerat">Batxillerat</button>
          <button class="tab-btn" data-categoria="FP">FP</button>
          <button class="tab-btn" data-categoria="Centre">Centre</button>
          <button class="tab-btn" data-categoria="Projectes">Projectes</button>
          <button class="tab-btn" data-categoria="Erasmus+">Erasmus+</button>
        </div>
      </div>
      <!-- Totes les notícies, renderitzades per JS -->
      <div id="noticies-totes" class="graella-cards graella-3">
        <p>Carregant notícies…</p>
      </div>
    </div>
  </section>

  <!-- PEU DE PÀGINA -->

  <div data-include="partials/footer.html"></div>

  <script src="js/includes.js"></script>
  <script src="data/contingut.js"></script>
  <script src="data/noticias.js"></script>
  <script src="js/main.js"></script>
  <script>
    // Filtre de notícies per categoria (específic d'aquesta pàgina)
    document.addEventListener('DOMContentLoaded', () => {
      const botons = document.querySelectorAll('#filtres-noticies .tab-btn');
      botons.forEach(btn => {
        btn.addEventListener('click', () => {
          botons.forEach(b => b.classList.remove('actiu'));
          btn.classList.add('actiu');
          const cat = btn.dataset.categoria;
          const contenidor = document.getElementById('noticies-totes');
          if (!contenidor) return;

          let noticies = [...NOTICIES].sort((a, b) => {
            const [da, ma, ya] = a.data.split('/').map(Number);
            const [db, mb, yb] = b.data.split('/').map(Number);
            return new Date(yb, mb - 1, db) - new Date(ya, ma - 1, da);
          });

          if (cat !== 'totes') noticies = noticies.filter(n => n.categoria === cat);

          if (noticies.length === 0) {
            contenidor.innerHTML = '<p style="color:var(--color-text-suau);grid-column:1/-1">No hi ha notícies en aquesta categoria.</p>';
            return;
          }

          contenidor.innerHTML = noticies.map(n => `
            <article class="noticia-card">
              <div class="noticia-cap-imatge" style="${capImatge(n)}" role="img" aria-label="${n.titol}"></div>
              <div class="noticia-cos">
                <div class="noticia-meta">
                  <span class="noticia-categoria">${n.categoria}</span>
                  <span class="noticia-data"><i class="fa-regular fa-calendar-days"></i> ${n.data}</span>
                </div>
                <h3>${n.titol}</h3>
                <p>${n.resum}</p>
                ${n.url ? `<a href="${n.url}" class="noticia-link" target="_blank" rel="noopener">Llegir més →</a>` : ''}
              </div>
            </article>
          `).join('');
        });
      });
    });
  </script>
</body>
</html>
