<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a5c38"/>
      <stop offset="100%" style="stop-color:#27ae60"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#g)"/>

  <!-- Formes de fons -->
  <circle cx="700" cy="50" r="140" fill="white" fill-opacity="0.04"/>
  <circle cx="50" cy="350" r="100" fill="white" fill-opacity="0.05"/>
  <rect x="0" y="280" width="800" height="120" fill="black" fill-opacity="0.15"/>

  <!-- Diploma / document -->
  <g transform="translate(400, 160)">
    <rect x="-130" y="-110" width="260" height="200" rx="8" fill="white" fill-opacity="0.12" stroke="white" stroke-opacity="0.3" stroke-width="1.5"/>
    <!-- Segell circular -->
    <circle cx="0" cy="-10" r="55" fill="none" stroke="#f0c000" stroke-opacity="0.8" stroke-width="3"/>
    <circle cx="0" cy="-10" r="45" fill="none" stroke="#f0c000" stroke-opacity="0.4" stroke-width="1"/>
    <!-- Lletra FP al centre -->
    <text x="0" y="-2" font-family="Arial, sans-serif" font-size="26" fill="#f0c000" fill-opacity="0.9" text-anchor="middle" font-weight="bold">FP</text>
    <!-- Línies de text -->
    <line x1="-90" y1="60" x2="90" y2="60" stroke="white" stroke-opacity="0.35" stroke-width="2"/>
    <line x1="-70" y1="75" x2="70" y2="75" stroke="white" stroke-opacity="0.25" stroke-width="1.5"/>
  </g>

  <!-- Birret de graduació -->
  <g transform="translate(620, 110)">
    <polygon points="0,-30 80,10 0,50 -80,10" fill="white" fill-opacity="0.2"/>
    <rect x="-12" y="10" width="24" height="30" fill="white" fill-opacity="0.15"/>
    <line x1="80" y1="10" x2="90" y2="50" stroke="white" stroke-opacity="0.4" stroke-width="3"/>
    <circle cx="90" cy="55" r="6" fill="#f0c000" fill-opacity="0.8"/>
  </g>

  <!-- Text -->
  <text x="400" y="315" font-family="Georgia, serif" font-size="26" fill="white" text-anchor="middle" font-weight="bold" letter-spacing="0.5">Admesos FP Grau Superior 2025-26</text>
  <text x="400" y="350" font-family="Arial, sans-serif" font-size="16" fill="white" fill-opacity="0.7" text-anchor="middle">IES Calvià · Formació Professional</text>
</svg>
