<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7d3c0a"/>
      <stop offset="100%" style="stop-color:#ca6f1e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#g)"/>

  <!-- Fons decoratiu -->
  <circle cx="700" cy="80" r="130" fill="white" fill-opacity="0.04"/>
  <circle cx="60" cy="330" r="100" fill="white" fill-opacity="0.04"/>
  <rect x="0" y="290" width="800" height="110" fill="black" fill-opacity="0.15"/>

  <!-- Plat rodó -->
  <g transform="translate(400, 175)">
    <!-- Plat base -->
    <circle cx="0" cy="0" r="110" fill="white" fill-opacity="0.1" stroke="white" stroke-opacity="0.2" stroke-width="2"/>
    <circle cx="0" cy="0" r="90" fill="white" fill-opacity="0.06" stroke="white" stroke-opacity="0.15" stroke-width="1"/>
    <!-- Contingut del plat (abstracte) -->
    <ellipse cx="-15" cy="-10" rx="35" ry="25" fill="white" fill-opacity="0.15"/>
    <ellipse cx="20" cy="15" rx="28" ry="20" fill="white" fill-opacity="0.12"/>
    <circle cx="-25" cy="20" r="12" fill="white" fill-opacity="0.1"/>
  </g>

  <!-- Forquilla -->
  <g transform="translate(530, 175)">
    <rect x="-3" y="-80" width="6" height="160" rx="3" fill="white" fill-opacity="0.3"/>
    <rect x="-10" y="-80" width="4" height="50" rx="2" fill="white" fill-opacity="0.3"/>
    <rect x="4" y="-80" width="4" height="50" rx="2" fill="white" fill-opacity="0.3"/>
    <path d="M-10,-30 Q-3,-10 -3,0" stroke="white" stroke-opacity="0.3" stroke-width="4" fill="none"/>
    <path d="M8,-30 Q3,-10 3,0" stroke="white" stroke-opacity="0.3" stroke-width="4" fill="none"/>
  </g>

  <!-- Ganivet -->
  <g transform="translate(270, 175)">
    <rect x="-3" y="-80" width="6" height="160" rx="3" fill="white" fill-opacity="0.3"/>
    <path d="M3,-80 Q20,-40 3,0" fill="white" fill-opacity="0.2"/>
  </g>

  <!-- Creu de cuiner (barreta de xef) -->
  <g transform="translate(610, 95)">
    <ellipse cx="0" cy="0" rx="28" ry="20" fill="white" fill-opacity="0.2"/>
    <rect x="-4" y="-20" width="8" height="55" rx="4" fill="white" fill-opacity="0.2"/>
  </g>

  <!-- Text -->
  <text x="400" y="316" font-family="Georgia, serif" font-size="26" fill="white" text-anchor="middle" font-weight="bold">Restaurant Pedagògic — Temporada 2025</text>
  <text x="400" y="351" font-family="Arial, sans-serif" font-size="16" fill="white" fill-opacity="0.7" text-anchor="middle">IES Calvià · Formació Professional</text>
</svg>
